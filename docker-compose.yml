services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-esolang_battle_2}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-esolang_battle_2}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      target: migration
    environment:
      DATABASE_URL: ${DATABASE_URL_INTERNAL}
    depends_on:
      db:
        condition: service_healthy


  web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL_INTERNAL}
      REDIS_HOST: ${REDIS_HOST_INTERNAL}
      REDIS_PORT: ${REDIS_PORT_INTERNAL:-6379}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}

  worker:
    build:
      context: .
      target: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: ${DATABASE_URL_INTERNAL}
      REDIS_HOST: ${REDIS_HOST_INTERNAL}
      REDIS_PORT: ${REDIS_PORT_INTERNAL:-6379}
      DOCKER_HOST: unix:///var/run/docker.sock

volumes:
  db-data:
